{% extends 'base.html' %}
{% block title %}Solicitar Doação{% endblock %}
{% block content %}
<div class="container form-container">
    <div class="auth-card">
        <h1>Solicitar Doação</h1>
        <p>Você está solicitando: <strong>{{ doacao.titulo }}</strong></p>
        <form method="POST">
            <div class="form-group">
                <label>Por que você tem interesse nesta doação?</label>
                <textarea name="motivo" rows="3" required placeholder="Explique brevemente sua necessidade..."></textarea>
            </div>
            <div class="form-group">
                <label>Mensagem para o doador</label>
                <textarea name="mensagem" rows="2" required placeholder="Olá, gostaria de saber se ainda está disponível..."></textarea>
            </div>
            <div class="form-group">
                <label>Seu telefone/WhatsApp para contato</label>
                <input type="text" name="telefone" value="{{ current_user.telefone }}" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Enviar Solicitação</button>
        </form>
    </div>
</div>
{% endblock %}
