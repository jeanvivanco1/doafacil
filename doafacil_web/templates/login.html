{% extends 'base.html' %}

{% block title %}Entrar{% endblock %}

{% block content %}
<div class="container auth-container">
    <div class="auth-card">
        <h2>Bem-vindo de volta</h2>
        <p>Acesse sua conta para continuar.</p>
        <form method="POST">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" name="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" name="senha" id="senha" required placeholder="Sua senha">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Entrar</button>
        </form>
        <p class="auth-footer">Não tem uma conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a></p>
        
        <div class="demo-accounts">
            <p><strong>Contas de demonstração:</strong></p>
            <p>Doador: doador@doafacil.com / 123456</p>
            <p>Adotante: adotante@doafacil.com / 123456</p>
        </div>
    </div>
</div>
{% endblock %}
